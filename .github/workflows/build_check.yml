name: build_check

on:
  push:
    branches:
      - main
      - 'build/**'
    paths-ignore:
      - '**.md'
      - '.editorconfig'
      - '.gitignore'
      - '.github/dependabot.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore BetterNTE.csproj --nologo

    - name: Build
      run: dotnet build BetterNTE.csproj -c Release --nologo --no-restore -v m
